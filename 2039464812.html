<h2>问题描述</h2>
<p>本人高二…最近用艾宾浩斯记忆曲线来背诵单词反而变得有点不自信…因为它里面规定的是10个单词背5分钟然后再去复习，而我10个单词得背…10分钟…效率比之前还要慢了点………变得不太自信了…所以想问…艾宾浩斯记忆曲线…该怎么实际应用才能更高效呢？有人用过这个方法吗？可以来讲一下吗！！谢谢！！</p><figure data-size="normal"><img class="origin_image zh-lightbox-thumb" data-original="https://pic1.zhimg.com/v2-545287fdcabfd3a310c92404ed5516a8_r.jpg" data-rawheight="1024" data-rawwidth="1024" data-size="normal" src="https://pic1.zhimg.com/v2-545287fdcabfd3a310c92404ed5516a8_1440w.jpg" width="1024"/></figure><p></p>
