<h1><a href="https://www.zhihu.com/question/502302438/answer/2253479931" target="_blank" rel="noopener noreferrer">请问用anki做填空题复习，同一个题五个挖空都改了c1，但是第二次复习到显示提示无填空2要怎么办呀？</a></h1>
<div class="author">
<img class="avatar" id="avatar" src="https://pic1.zhimg.com/v2-d571786b77078321f5f6ef92f4967877_l.jpg?source=2c26e567" />
<div>
<h2 rel="author">

<p>在Anki制作2.9万张卡片，复习33万次。Anki高考践行者、推广者。</p>
</div>
</div>
<time datetime="2021-12-02T10:37:08">发表于 2021年12月02日</time>
<p rel="stats"style="color: #999; font-size: 0.9em;">6 👍 / 10 💬</p>
</header>
<article>

<p data-pid="lCgAo682">你一开始挖空，c1c2……c5，anki生成了五张卡片，分别挖掉对应的空。</p><p data-pid="RdPDRWe_">然后你把他们全改成了c1，后面四张卡片就变成多余的卡了。</p><p data-pid="kmoH7Z3F">所以，你需要用「清理空卡片」来解决这个问题。</p><figure data-size="normal"><noscript><img class="origin_image zh-lightbox-thumb" data-caption="" data-default-watermark-src="https://pic1.zhimg.com/50/v2-191866fab21ddb51fc9e6a9826ae418d_720w.jpg?source=2c26e567" data-original="https://pic1.zhimg.com/v2-9130bb39ead93713d31c1e3a301afac6_r.jpg?source=2c26e567" data-original-token="v2-9130bb39ead93713d31c1e3a301afac6" data-rawheight="606" data-rawwidth="918" data-size="normal" src="https://picx.zhimg.com/50/v2-9130bb39ead93713d31c1e3a301afac6_720w.jpg?source=2c26e567" width="918"/></noscript><img class="origin_image zh-lightbox-thumb lazy" data-caption="" data-default-watermark-src="https://pic1.zhimg.com/50/v2-191866fab21ddb51fc9e6a9826ae418d_720w.jpg?source=2c26e567" data-original="https://pic1.zhimg.com/v2-9130bb39ead93713d31c1e3a301afac6_r.jpg?source=2c26e567" data-original-token="v2-9130bb39ead93713d31c1e3a301afac6" data-rawheight="606" data-rawwidth="918" data-size="normal" src="https://picx.zhimg.com/50/v2-9130bb39ead93713d31c1e3a301afac6_720w.jpg?source=2c26e567" width="918"/></figure><p></p>
