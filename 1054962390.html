<h2>问题描述</h2>
<p></p><p>最近开始使用Anki了，软件显示学习了21分钟，但是实际用了40分钟</p><figure data-size="normal"><img class="origin_image zh-lightbox-thumb" data-original="https://pic2.zhimg.com/v2-3908da2802ede39c3ed0d32858f526b7_r.jpg" data-rawheight="1298" data-rawwidth="1404" data-size="normal" src="https://pic2.zhimg.com/v2-3908da2802ede39c3ed0d32858f526b7_1440w.jpg" width="1404"/></figure><p></p>
</div>
<hr>
<p data-pid="NrkA6kXk">Anki 计算的应该是你在卡片页面停留的时间，并且有一个最大回答时间，超出这个时间将不计入在内。</p><figure data-size="normal"><noscript><img class="origin_image zh-lightbox-thumb" data-caption="" data-default-watermark-src="https://pic1.zhimg.com/50/v2-da81c68fbc583e892dee9e4a45a800f3_720w.jpg?source=2c26e567" data-original="https://pica.zhimg.com/v2-78812af65339d2728d91088cfa232604_r.jpg?source=2c26e567" data-original-token="v2-c42e762084ea69428641a86933e27c1a" data-rawheight="2280" data-rawwidth="1080" data-size="normal" src="https://picx.zhimg.com/50/v2-78812af65339d2728d91088cfa232604_720w.jpg?source=2c26e567" width="1080"/></noscript><img class="origin_image zh-lightbox-thumb lazy" data-caption="" data-default-watermark-src="https://pic1.zhimg.com/50/v2-da81c68fbc583e892dee9e4a45a800f3_720w.jpg?source=2c26e567" data-original="https://pica.zhimg.com/v2-78812af65339d2728d91088cfa232604_r.jpg?source=2c26e567" data-original-token="v2-c42e762084ea69428641a86933e27c1a" data-rawheight="2280" data-rawwidth="1080" data-size="normal" src="https://picx.zhimg.com/50/v2-78812af65339d2728d91088cfa232604_720w.jpg?source=2c26e567" width="1080"/></figure><p></p>
