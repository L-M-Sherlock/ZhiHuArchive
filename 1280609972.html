<h2>问题描述</h2>
<p>我每次用anki电脑端/ios点击同步都提示我的牌组和ankiweb的牌组存在不能合并的差异，请问这个要怎么解决呢？为什么会出现这群情况呢？</p><figure data-size="normal"><img src="https://picx.zhimg.com/v2-a95eb5abee5e0358a80721c170f470a5_b.jpg" data-rawwidth="736" data-rawheight="344" data-size="normal" class="origin_image zh-lightbox-thumb" width="736" data-original="https://picx.zhimg.com/v2-a95eb5abee5e0358a80721c170f470a5_r.jpg"/></figure><p>呢？？？？？？?</p>
</div>
<hr>
<p data-pid="2mVrTBgb">第一次同步吗？是的话，无脑点上传。然后如果你在电脑上改了模板什么的，就在电脑上点上传，在手机上点下载。</p>
