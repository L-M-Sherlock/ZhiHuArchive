<h2>问题描述</h2>
本人处于某低段位的上海市市重点学校 和大多数学校一样 老师们平时盯得不紧 一到大考快马加鞭 急吼吼的 卷子成灾<br/>如果学校注重提高老师的上课效率 简明扼要地分析知识点 很多无用的 只为了讲而讲的啰嗦的话不讲 效率会提高 也可以压缩在校的学习时间
