<h2>问题描述</h2>
<p>电脑版不小心按到快捷键4，但是还不会，卡片已经当做学习了收起来了，有没有像pad或者手机那样的方式摇一摇可以重新学习？</p>
</div>
<hr>
<p data-pid="CxrAaz66">我记得，2.0版本的撤销复习的快捷键是Ctrl+Alt+z</p><p data-pid="Lpfj6tfN">2.1版本的是Ctrl+z</p><p data-pid="jq6TpyHe">或者你可以点击窗口顶部的编辑，取消上次复习。</p>
